# krpc service name: the base path segment → /bookshelf-server/Bookshelf/{method}
# (@UnsafeWeb drops the hidden '-' prefix so it is browser/frontend reachable).
rpc.server.app=bookshelf-server
# krpc gRPC port (default 50051).
rpc.server.port=50051
# Test profile uses a separate gRPC port so @QuarkusTest never collides with a running quarkusDev.
%test.rpc.server.port=50552
# Containerization: the image EXPOSE port = the krpc gRPC port.
quarkus.jib.ports=50051
# No rpc.server.jwks set → JWT auth is skipped (public read-only demo). A real edge service points
# this at a JWKS URL and sets rpc.server.exitOnJwksError=true so a bad JWKS fails loudly.

# ── native build (optional; run via the native-ci workflow or -Dquarkus.native.enabled=true) ──
# Pin the Mandrel builder image to jdk-21 (matches Quarkus 3.33.2's GraalVM 21).
quarkus.native.builder-image=quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-21
# Build inside a container (CI has Docker). Locally with a GraalVM install you can override
# -Dquarkus.native.container-build=false to compile directly.
quarkus.native.container-build=true
quarkus.native.container-runtime=docker
quarkus.jib.base-native-image=quay.io/quarkus/ubi9-quarkus-micro-image:2.0
# Flyway native: the quarkus-flyway extension collects db/migration/V*.sql into the image at build.

# ── datasource (PostgreSQL via docker-compose; see docker-compose.yml + README) ──
# The compose stack publishes on host port 5435 (not the default 5432) so it never collides with
# another local Postgres. The password is NOT committed for the default/prod profile — inject it at
# runtime via QUARKUS_DATASOURCE_PASSWORD. %dev/%test use a throwaway dev password (below).
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=bookshelf
quarkus.datasource.jdbc.url=jdbc:postgresql://127.0.0.1:5435/bookshelf
# Throwaway DEV/TEST credential only — matches docker-compose.yml. NEVER commit a real password;
# deployed environments inject QUARKUS_DATASOURCE_PASSWORD at runtime.
%dev.quarkus.datasource.password=bookshelf_dev
%test.quarkus.datasource.password=bookshelf_dev
# OTel auto-creates a child span per JDBC (agroal) call (off by default).
quarkus.datasource.jdbc.telemetry=true

# ── Flyway: apply db/migration/V*__*.sql to PG at startup ──
quarkus.flyway.migrate-at-start=true

# ── OpenTelemetry (vendor-neutral; dev uses the logging exporter — no Jaeger needed) ──
# krpc 1.1.1 has a BUILT-IN server interceptor: spans appear with zero hand-written filter.
quarkus.application.name=bookshelf-server
# Deployed profile = OTLP via the built-in 'cdi' exporter; the endpoint is runtime config
# (QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT). %dev/%test use the logging exporter — local, no network.
quarkus.otel.traces.exporter=cdi
%dev.quarkus.otel.traces.exporter=logging
%test.quarkus.otel.traces.exporter=logging
# W3C traceparent (tracecontext) + baggage propagation.
quarkus.otel.propagators=tracecontext,baggage
# dev: flush spans every 1s so you see them immediately.
quarkus.otel.bsp.schedule.delay=1s

quarkus.hibernate-validator.fail-fast=true
quarkus.log.level=INFO
%dev.quarkus.log.level=DEBUG
# OTel span re-narration is a trace signal, not a log: silence LoggingSpanExporter INFO dumps by
# default; WARN keeps SDK export warnings visible. dev opts back in to see span lines.
quarkus.log.category."io.opentelemetry".level=WARN
%dev.quarkus.log.category."io.opentelemetry".level=ALL
# Logs carry the OTel span's traceId/spanId (injected into MDC by quarkus-opentelemetry) — the
# single source of truth for correlating logs ↔ traces.
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{1.}] (%t) traceId=%X{traceId} spanId=%X{spanId} - %s%e%n
