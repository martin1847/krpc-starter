# secret-scan — no credential / private key / token ever lands in the committed tree (whole repo,
# both frontend/ and backend/). Runs gitleaks over the FULL git history (fetch-depth: 0): any
# un-exempted credential in any commit fails the gate. Exemptions live in .gitleaks.toml.
name: secret-scan
run-name: secret-scan ${{ github.sha }}

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan git history for secrets
        run: gitleaks git --config .gitleaks.toml --redact -v .
